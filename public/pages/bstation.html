<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BStation Anime Search · IkyTools 🔥</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 0% 0%, #0a0a1a 0%, #0f0f1f 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        /* Back Button */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(102,126,234,0.2);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s;
            border: 1px solid rgba(102,126,234,0.3);
            z-index: 100;
            cursor: pointer;
        }

        .back-button:hover {
            background: rgba(102,126,234,0.4);
            transform: translateX(-5px);
            border-color: #a78bfa;
        }

        .bstation-container {
            max-width: 1400px;
            margin: 0 auto;
            margin-top: 70px;
            background: rgba(255,255,255,0.05);
            border-radius: 32px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .container-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .container-header h2 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .limit-info {
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-family: monospace;
            border-left: 3px solid #a78bfa;
        }

        .search-section {
            margin-bottom: 40px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 16px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 1rem;
            background: rgba(0,0,0,0.4);
            color: white;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167,139,250,0.2);
        }

        .search-box input::placeholder {
            color: #8b92b0;
        }

        .search-box button {
            padding: 16px 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
        }

        .recommendations {
            margin-bottom: 30px;
        }

        .recommend-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #a78bfa;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .anime-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .anime-card:hover {
            transform: translateY(-8px);
            background: rgba(102,126,234,0.15);
            border-color: rgba(102,126,234,0.4);
            box-shadow: 0 12px 28px rgba(0,0,0,0.3);
        }

        .anime-thumb {
            width: 100%;
            height: 180px;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .anime-card:hover .anime-thumb {
            transform: scale(1.02);
        }

        .anime-info {
            padding: 18px;
        }

        .anime-title {
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 0.95rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .anime-meta {
            font-size: 0.75rem;
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .download-btn {
            margin-top: 12px;
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .result-section {
            margin-top: 40px;
        }

        .search-result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* Loading Spinner */
        .loading-spinner-container {
            text-align: center;
            padding: 60px;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            color: #8b92b0;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            font-size: 0.85rem;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            border-left: 3px solid #ff4757;
        }

        .toast.success {
            border-left-color: #4ade80;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 768px) {
            .bstation-container {
                padding: 24px;
                margin-top: 80px;
            }
            .container-header h2 {
                font-size: 1.4rem;
            }
            .search-box {
                flex-direction: column;
            }
            .search-box button {
                justify-content: center;
            }
            .anime-grid {
                grid-template-columns: 1fr;
            }
            .back-button {
                top: 12px;
                left: 12px;
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- Back Button -->
    <div class="back-button" onclick="goBack(); playClick()">
        <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
    </div>

    <div class="bstation-container">
        <div class="container-header">
            <h2>
                <i class="fas fa-tv"></i> BStation Anime Search
            </h2>
            <div class="limit-info" id="limitInfo">
                <i class="fas fa-tachometer-alt"></i> Limit: <span id="limitValue">--</span>/50
            </div>
        </div>
        
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari anime favoritmu... contoh: One Piece, Jujutsu Kaisen" onkeypress="if(event.key === 'Enter') searchAnime()">
                <button onclick="searchAnime()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </div>
        
        <div class="recommendations" id="recommendations">
            <div class="recommend-title">
                <i class="fas fa-fire" style="color: #f97316;"></i> Rekomendasi Anime Populer
            </div>
            <div class="anime-grid" id="recommendGrid">
                <div class="loading-spinner-container">
                    <div class="loading-spinner"></div>
                    <p>Loading rekomendasi...</p>
                </div>
            </div>
        </div>
        
        <div class="result-section" id="resultSection" style="display: none;">
            <div class="recommend-title">
                <i class="fas fa-search"></i> Hasil Pencarian
                <button onclick="showRecommendations()" style="margin-left: auto; background: none; border: none; color: #a78bfa; cursor: pointer; font-size: 0.8rem;">
                    <i class="fas fa-arrow-left"></i> Kembali
                </button>
            </div>
            <div id="searchResults" class="search-result-grid"></div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentLimit = 0;

        function playClick() {
            const audio = document.getElementById('clickSound');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Audio blocked'));
            }
        }

        function goBack() {
            window.location.href = '/dashboard';
        }

        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        async function getLimit() {
            try {
                const response = await fetch('/api/user/limit', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (response.ok) {
                    const data = await response.json();
                    currentLimit = data.limit || 0;
                    document.getElementById('limitValue').textContent = currentLimit;
                    return currentLimit;
                }
            } catch (error) {
                console.error('Error getting limit:', error);
            }
            return 0;
        }

        async function checkAndUpdateLimit() {
            await getLimit();
            if (currentLimit <= 0) {
                showToast('⚠️ Limit harian Anda habis! Coba lagi besok.', 'error');
                return false;
            }
            return true;
        }

        async function useLimit() {
            try {
                const response = await fetch('/api/user/use-limit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser?.username })
                });
                if (response.ok) {
                    await getLimit();
                }
            } catch (error) {
                console.error('Error using limit:', error);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Load recommendations on page load
        async function loadRecommendations() {
            const recommendGrid = document.getElementById('recommendGrid');
            
            try {
                const allowed = await checkAndUpdateLimit();
                if (!allowed) {
                    recommendGrid.innerHTML = '<div class="empty-state"><i class="fas fa-hourglass-half"></i><p>Limit habis hari ini! Besok lagi ya!</p></div>';
                    return;
                }
                
                const response = await fetch(`/api/bstation?username=${currentUser?.username || 'guest'}&q=One+piece`);
                const data = await response.json();
                
                if (data.status && data.result && data.result.length > 0) {
                    const animes = data.result.slice(0, 6);
                    recommendGrid.innerHTML = animes.map(anime => `
                        <div class="anime-card" onclick="searchWithQuery('${encodeURIComponent(anime.title.split(' ').slice(0, 2).join(' '))}')">
                            <img src="${anime.thumbnail || 'https://via.placeholder.com/280x180?text=No+Image'}" class="anime-thumb" onerror="this.src='https://via.placeholder.com/280x180?text=No+Image'">
                            <div class="anime-info">
                                <div class="anime-title">${escapeHtml(anime.title)}</div>
                                <div class="anime-meta">
                                    <span><i class="fas fa-user"></i> ${escapeHtml(anime.uploader || 'Unknown')}</span>
                                    <span><i class="fas fa-eye"></i> ${anime.views || '0'}</span>
                                </div>
                                <div class="anime-meta">
                                    <span><i class="fas fa-clock"></i> ${anime.duration || 'N/A'}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    recommendGrid.innerHTML = '<div class="empty-state"><i class="fas fa-frown"></i><p>Gagal memuat rekomendasi</p></div>';
                }
            } catch (error) {
                recommendGrid.innerHTML = '<div class="empty-state"><i class="fas fa-wifi"></i><p>Error koneksi: ' + error.message + '</p></div>';
                console.error(error);
            }
        }
        
        async function searchAnime() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showToast('Masukkan kata kunci pencarian!', 'error');
                return;
            }
            searchWithQuery(query);
        }
        
        async function searchWithQuery(query) {
            const resultSection = document.getElementById('resultSection');
            const searchResults = document.getElementById('searchResults');
            const recommendations = document.getElementById('recommendations');
            
            const allowed = await checkAndUpdateLimit();
            if (!allowed) return;
            
            resultSection.style.display = 'block';
            recommendations.style.display = 'none';
            searchResults.innerHTML = '<div class="loading-spinner-container"><div class="loading-spinner"></div><p>Mencari anime...</p></div>';
            
            try {
                const response = await fetch(`/api/bstation?username=${currentUser?.username || 'guest'}&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.status && data.result && data.result.length > 0) {
                    searchResults.innerHTML = data.result.map(anime => `
                        <div class="anime-card">
                            <img src="${anime.thumbnail || 'https://via.placeholder.com/280x180?text=No+Image'}" class="anime-thumb" onerror="this.src='https://via.placeholder.com/280x180?text=No+Image'">
                            <div class="anime-info">
                                <div class="anime-title">${escapeHtml(anime.title)}</div>
                                <div class="anime-meta">
                                    <span><i class="fas fa-user"></i> ${escapeHtml(anime.uploader || 'Unknown')}</span>
                                    <span><i class="fas fa-eye"></i> ${anime.views || '0'}</span>
                                </div>
                                <div class="anime-meta">
                                    <span><i class="fas fa-clock"></i> ${anime.duration || 'N/A'}</span>
                                </div>
                                <button class="download-btn" onclick="window.open('${anime.url}', '_blank'); playClick(); event.stopPropagation()">
                                    <i class="fas fa-play"></i> Tonton Sekarang
                                </button>
                            </div>
                        </div>
                    `).join('');
                    
                    await useLimit();
                } else {
                    searchResults.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>Tidak ada hasil ditemukan untuk "' + escapeHtml(query) + '"</p></div>';
                }
            } catch (error) {
                searchResults.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error: ' + error.message + '</p></div>';
            }
        }
        
        function showRecommendations() {
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('recommendations').style.display = 'block';
            document.getElementById('searchInput').value = '';
        }
        
        // Load user and limit
        async function loadUser() {
            const userData = localStorage.getItem('currentUser');
            if (userData) {
                currentUser = JSON.parse(userData);
            }
            await getLimit();
            loadRecommendations();
        }
        
        // Audio click sound
        const clickAudio = new Audio('/audio/click.mp3');
        clickAudio.volume = 0.2;
        window.playClick = function() {
            const clone = clickAudio.cloneNode();
            clone.play().catch(() => {});
        };
        
        loadUser();
    </script>
</body>
</html>
