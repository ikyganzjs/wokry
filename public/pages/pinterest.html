<!DOCTYPE html>
<html>
<head>
    <style>
        .pinterest-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
        }
        
        .search-section {
            margin-bottom: 30px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }
        
        .search-box input {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .search-box button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #e60023, #b00020);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .pin-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        
        .pin-card:hover {
            transform: translateY(-5px);
        }
        
        .pin-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        
        .pin-info {
            padding: 15px;
            text-align: center;
        }
        
        .download-btn-pin {
            background: #e60023;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
        }
        
        .no-results {
            text-align: center;
            padding: 50px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="pinterest-container">
        <h2>🖼️ Pinterest Image Downloader</h2>
        
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari gambar... (contoh: anime, kucing, landscape)" onkeypress="if(event.key === 'Enter') searchPinterest()">
                <button onclick="searchPinterest()">🔍 Cari Gambar</button>
            </div>
        </div>
        
        <div id="gallery" class="gallery-grid">
            <div class="loading-spinner-container">
                <div class="loading-spinner"></div>
                <p>Masukkan kata kunci untuk mencari gambar</p>
            </div>
        </div>
    </div>
    
    <script>
        async function searchPinterest() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showToast('Masukkan kata kunci pencarian!', 'error');
                return;
            }
            
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<div class="loading-spinner-container"><div class="loading-spinner"></div><p>Mencari gambar...</p></div>';
            
            // Check limit
            const allowed = await checkAndUpdateLimit();
            if (!allowed) return;
            
            try {
                const response = await fetch(`/api/pinterest?username=${window.currentUser?.username}&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.status && data.result && data.result.length > 0) {
                    gallery.innerHTML = data.result.map((imgUrl, index) => `
                        <div class="pin-card">
                            <img src="${imgUrl}" class="pin-image" loading="lazy" onclick="window.open('${imgUrl}', '_blank')" style="cursor: pointer;">
                            <div class="pin-info">
                                <button class="download-btn-pin" onclick="downloadImage('${imgUrl}', 'pinterest_${index + 1}.jpg')">
                                    📥 Download Gambar
                                </button>
                            </div>
                        </div>
                    `).join('');
                    
                    await useLimit();
                } else {
                    gallery.innerHTML = '<div class="no-results">❌ Tidak ada gambar ditemukan</div>';
                }
            } catch (error) {
                gallery.innerHTML = '<div class="no-results">Error: ' + error.message + '</div>';
            }
        }
        
        async function downloadImage(url, filename) {
            playClick();
            
            try {
                // Fetch image as blob
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(blobUrl);
                
                showToast('Download dimulai!', 'success');
            } catch (error) {
                // Fallback: open in new tab
                window.open(url, '_blank');
                showToast('Gambar dibuka di tab baru', 'info');
            }
        }
        
        // Auto-load some default images on page load
        async function loadDefaultImages() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<div class="loading-spinner-container"><div class="loading-spinner"></div><p>Memuat gambar populer...</p></div>';
            
            try {
                const response = await fetch(`/api/pinterest?username=${window.currentUser?.username}&q=anime`);
                const data = await response.json();
                
                if (data.status && data.result) {
                    gallery.innerHTML = data.result.slice(0, 12).map((imgUrl, index) => `
                        <div class="pin-card">
                            <img src="${imgUrl}" class="pin-image" loading="lazy" onclick="window.open('${imgUrl}', '_blank')" style="cursor: pointer;">
                            <div class="pin-info">
                                <button class="download-btn-pin" onclick="downloadImage('${imgUrl}', 'anime_${index + 1}.jpg')">
                                    📥 Download Gambar
                                </button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                gallery.innerHTML = '<div class="no-results">Klik search untuk mulai mencari gambar</div>';
            }
        }
        
        loadDefaultImages();
    </script>
</body>
</html>
