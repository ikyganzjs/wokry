<!DOCTYPE html>
<html>
<head>
    <style>
        .ig-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
        }
        .url-input {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .url-input input {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .url-input button {
            padding: 15px 30px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .result-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
        }
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .media-item {
            text-align: center;
        }
        .media-item img, .media-item video {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="ig-container">
        <h2>📸 Instagram Downloader</h2>
        <div class="url-input">
            <input type="text" id="igUrl" placeholder="Masukkan URL Instagram (post/reel)...">
            <button onclick="downloadIG()">📥 Download</button>
        </div>
        <div id="result"></div>
    </div>
    
    <script>
        async function downloadIG() {
            const url = document.getElementById('igUrl').value.trim();
            if (!url) {
                showToast('Masukkan URL Instagram!', 'error');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading-spinner-container"><div class="loading-spinner"></div><p>Memproses...</p></div>';
            
            const allowed = await checkAndUpdateLimit();
            if (!allowed) return;
            
            try {
                const response = await fetch(`/api/instagram?username=${window.currentUser?.username}&url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data.status && data.result && data.result.length > 0) {
                    const mediaGrid = data.result.map((item, index) => {
                        const isVideo = item.url_download && (item.url_download.includes('.mp4') || item.kualitas.includes('Video'));
                        return `
                            <div class="media-item">
                                ${isVideo ? 
                                    `<video controls><source src="${item.url_download}" type="video/mp4"></video>` :
                                    `<img src="${item.thumbnail}" onerror="this.src='https://via.placeholder.com/200'">`
                                }
                                <button class="download-btn" style="margin-top:10px; width:100%;" onclick="downloadFile('${item.url_download}', 'instagram_${index + 1}.${isVideo ? 'mp4' : 'jpg'}')">
                                    📥 ${item.kualitas || 'Download'}
                                </button>
                            </div>
                        `;
                    }).join('');
                    
                    resultDiv.innerHTML = `
                        <div class="result-card">
                            <div class="media-grid">${mediaGrid}</div>
                        </div>
                    `;
                    await useLimit();
                } else {
                    resultDiv.innerHTML = '<div class="result-card"><p>❌ Gagal memproses URL. Cek link Instagram!</p></div>';
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result-card"><p>❌ Error: ${error.message}</p></div>`;
            }
        }
    </script>
</body>
</html>
