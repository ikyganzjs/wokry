<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TikTok Downloader · IkyTools </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 0% 0%, #0a0a1a 0%, #0f0f1f 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(102,126,234,0.2);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s;
            border: 1px solid rgba(102,126,234,0.3);
            z-index: 100;
            cursor: pointer;
        }

        .back-button:hover {
            background: rgba(102,126,234,0.4);
            transform: translateX(-5px);
            border-color: #a78bfa;
        }

        .tiktok-container {
            max-width: 900px;
            margin: 0 auto;
            margin-top: 80px;
            background: rgba(255,255,255,0.05);
            border-radius: 32px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .container-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .container-header h2 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, #00f2ea, #ff0050);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-card {
            background: rgba(0,242,234,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(0,242,234,0.3);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .info-card i {
            font-size: 2rem;
            color: #00f2ea;
        }

        .info-card p {
            flex: 1;
            font-size: 0.85rem;
            color: #b9c2e6;
            line-height: 1.5;
        }

        .url-input {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .url-input input {
            flex: 1;
            padding: 16px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 1rem;
            background: rgba(0,0,0,0.4);
            color: white;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .url-input input:focus {
            outline: none;
            border-color: #00f2ea;
            box-shadow: 0 0 0 3px rgba(0,242,234,0.2);
        }

        .url-input input::placeholder {
            color: #8b92b0;
        }

        .url-input button {
            padding: 16px 32px;
            background: linear-gradient(135deg, #000000, #1a1a2e);
            border: 1px solid rgba(0,242,234,0.5);
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .url-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,242,234,0.3);
            border-color: #00f2ea;
        }

        .result-card {
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .video-preview {
            margin: 20px 0;
            text-align: center;
        }

        .video-preview video {
            max-width: 100%;
            max-height: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .thumbnail-preview {
            position: relative;
            cursor: pointer;
            border-radius: 20px;
            overflow: hidden;
        }

        .thumbnail-preview img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 20px;
            transition: transform 0.3s;
        }

        .thumbnail-preview:hover img {
            transform: scale(1.02);
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            transition: 0.2s;
        }

        .info-text {
            margin: 15px 0;
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
        }

        .video-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .video-stats span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #b9c2e6;
        }

        .download-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .dl-btn {
            padding: 12px 28px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .dl-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .btn-sd { 
            background: linear-gradient(135deg, #4facfe, #00f2fe); 
            color: white; 
        }
        .btn-hd { 
            background: linear-gradient(135deg, #ff0050, #ff4757); 
            color: white; 
        }
        .btn-audio { 
            background: linear-gradient(135deg, #00ff88, #00b894); 
            color: black; 
        }

        .loading-spinner-container {
            text-align: center;
            padding: 60px;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,242,234,0.3);
            border-top-color: #00f2ea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            color: #8b92b0;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            font-size: 0.85rem;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            border-left: 3px solid #ff4757;
        }

        .toast.success {
            border-left-color: #4ade80;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .example-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .example-title {
            font-size: 0.7rem;
            color: #8b92b0;
            margin-bottom: 8px;
        }

        .example-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .example-btn {
            background: rgba(0,242,234,0.2);
            border: 1px solid rgba(0,242,234,0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            color: #b9c2e6;
        }

        .example-btn:hover {
            background: rgba(0,242,234,0.4);
        }

        @media (max-width: 768px) {
            .tiktok-container {
                padding: 24px;
                margin-top: 90px;
            }
            .container-header h2 {
                font-size: 1.4rem;
            }
            .url-input {
                flex-direction: column;
            }
            .url-input button {
                justify-content: center;
            }
            .back-button {
                top: 12px;
                left: 12px;
                padding: 8px 16px;
                font-size: 0.8rem;
            }
            .download-buttons {
                flex-direction: column;
            }
            .dl-btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="back-button" onclick="goBack(); playClick()">
        <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
    </div>

    <div class="tiktok-container">
        <div class="container-header">
            <h2>
                <i class="fab fa-tiktok"></i> TikTok Downloader
            </h2>
        </div>

        <div class="info-card">
            <i class="fab fa-tiktok"></i>
            <p>Download video TikTok tanpa watermark! Support video biasa, slideshow, dan audio. Cukup paste link TikTok, pilih kualitas yang diinginkan.</p>
        </div>

        <div class="url-input">
            <input type="text" id="tiktokUrl" placeholder="https://www.tiktok.com/@username/video/1234567890123456789" onkeypress="if(event.key === 'Enter') downloadTikTok()">
            <button onclick="downloadTikTok()">
                <i class="fab fa-tiktok"></i> Download Now
            </button>
        </div>

        <div class="example-section">
            <div class="example-title">
                <i class="fas fa-lightbulb"></i> Contoh URL:
            </div>
            <div class="example-buttons">
                <div class="example-btn" onclick="setExample('https://www.tiktok.com/@tiktok/video/7123456789012345678')">
                    Video TikTok
                </div>
                <div class="example-btn" onclick="setExample('https://vt.tiktok.com/ZS1234567/')">
                    Short Link
                </div>
                <div class="example-btn" onclick="setExample('https://www.tiktok.com/@username/photo/1234567890123456789')">
                    Slideshow
                </div>
            </div>
            <div style="font-size: 0.65rem; color: #6b728e; margin-top: 8px;">
                <i class="fas fa-info-circle"></i> Support link dari app TikTok, vt.tiktok.com, dan tiktok.com
            </div>
        </div>

        <div id="result"></div>
    </div>

    <script>
        let currentUser = null;

        function playClick() {
            const audio = document.getElementById('clickSound');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Audio blocked'));
            }
        }

        function goBack() {
            window.location.href = '/dashboard';
        }

        function setExample(url) {
            document.getElementById('tiktokUrl').value = url;
            playClick();
        }

        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function downloadVideo(url, filename) {
            playClick();
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast(' Download dimulai!', 'success');
        }

        function openVideoPreview(videoUrl) {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.background = 'rgba(0,0,0,0.95)';
            modal.style.zIndex = '2000';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.cursor = 'pointer';
            
            const video = document.createElement('video');
            video.src = videoUrl;
            video.controls = true;
            video.autoplay = true;
            video.style.maxWidth = '90%';
            video.style.maxHeight = '90%';
            video.style.borderRadius = '16px';
            
            modal.appendChild(video);
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function downloadTikTok() {
            const url = document.getElementById('tiktokUrl').value.trim();
            if (!url) {
                showToast('Masukkan URL TikTok terlebih dahulu!', 'error');
                return;
            }
            
            if (!url.includes('tiktok.com')) {
                showToast('URL tidak valid! Masukkan URL TikTok yang benar.', 'error');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading-spinner-container"><div class="loading-spinner"></div><p> Memproses video TikTok...</p></div>';
            
            try {
                const response = await fetch(`/api/tiktok-dl?username=${currentUser?.username || 'guest'}&url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data.status && data.result) {
                    const r = data.result;
                    const hasVideo = r.video_sd || r.video_hd;
                    const hasAudio = r.mp3;
                    
                    resultDiv.innerHTML = `
                        <div class="result-card">
                            <div class="video-preview">
                                ${r.video_url ? `
                                    <div class="thumbnail-preview" onclick="openVideoPreview('${r.video_url}')">
                                        <img src="${r.thumbnail || 'https://via.placeholder.com/400x500?text=TikTok+Video'}" onerror="this.src='https://via.placeholder.com/400x500?text=No+Preview'">
                                        <div class="play-overlay">
                                            <i class="fas fa-play"></i>
                                        </div>
                                    </div>
                                ` : r.thumbnail ? `
                                    <img src="${r.thumbnail}" style="max-width: 100%; border-radius: 20px;" onerror="this.src='https://via.placeholder.com/400x500?text=No+Preview'">
                                ` : ''}
                                
                                <div class="info-text">
                                    <strong>${escapeHtml(r.title || r.desc || 'TikTok Video')}</strong>
                                </div>
                                
                                ${r.author ? `
                                    <div class="video-stats">
                                        <span><i class="fab fa-tiktok"></i> @${escapeHtml(r.author)}</span>
                                        ${r.likes ? `<span><i class="fas fa-heart" style="color: #ff4757;"></i> ${formatNumber(r.likes)}</span>` : ''}
                                        ${r.comments ? `<span><i class="fas fa-comment"></i> ${formatNumber(r.comments)}</span>` : ''}
                                        ${r.shares ? `<span><i class="fas fa-share"></i> ${formatNumber(r.shares)}</span>` : ''}
                                    </div>
                                ` : ''}
                            </div>
                            
                            <div class="download-buttons">
                                ${r.video_sd ? `<button class="dl-btn btn-sd" onclick="downloadVideo('${r.video_sd}', 'tiktok_video_sd_${Date.now()}.mp4')"><i class="fas fa-download"></i> SD Quality</button>` : ''}
                                ${r.video_hd ? `<button class="dl-btn btn-hd" onclick="downloadVideo('${r.video_hd}', 'tiktok_video_hd_${Date.now()}.mp4')"><i class="fas fa-download"></i> HD Quality</button>` : ''}
                                ${r.mp3 ? `<button class="dl-btn btn-audio" onclick="downloadVideo('${r.mp3}', 'tiktok_audio_${Date.now()}.mp3')"><i class="fas fa-music"></i> Audio Only</button>` : ''}
                            </div>
                            
                            ${!hasVideo && !hasAudio ? '<div class="info-text" style="color: #ff4757;"> Tidak ada link download yang tersedia</div>' : ''}
                            
                            <div class="info-text" style="margin-top: 15px; font-size: 0.7rem; color: #6b728e;">
                                <i class="fas fa-shield-alt"></i> Video tanpa watermark, download langsung ke perangkat Anda
                            </div>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="empty-state">
                            <i class="fab fa-tiktok"></i>
                            <p>${data.message || 'Gagal memproses video. Cek URL atau coba lagi nanti.'}</p>
                            <p style="font-size: 0.75rem; margin-top: 10px;">Pastikan URL valid dan video masih tersedia.</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-wifi"></i>
                        <p>Error: ${error.message}</p>
                        <p style="font-size: 0.75rem; margin-top: 10px;">Periksa koneksi internet Anda dan coba lagi.</p>
                    </div>
                `;
                console.error(error);
            }
        }

        async function loadUser() {
            const userData = localStorage.getItem('currentUser');
            if (!userData) {
                window.location.href = '/login';
                return;
            }
            
            currentUser = JSON.parse(userData);
        }

        const clickAudio = new Audio('/audio/click.mp3');
        clickAudio.volume = 0.2;
        window.playClick = function() {
            const clone = clickAudio.cloneNode();
            clone.play().catch(() => {});
        };
        window.downloadVideo = downloadVideo;
        window.openVideoPreview = openVideoPreview;

        loadUser();
    </script>
</body>
</html>
