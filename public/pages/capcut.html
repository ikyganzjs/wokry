<!DOCTYPE html>
<html>
<head>
    <style>
        .capcut-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
        }
        .url-input {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .url-input input {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .url-input button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .result-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
        }
        .video-preview video {
            max-width: 100%;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <div class="capcut-container">
        <h2>✂️ CapCut Template Downloader</h2>
        <div class="url-input">
            <input type="text" id="capcutUrl" placeholder="Masukkan URL CapCut...">
            <button onclick="downloadCapcut()">📥 Download</button>
        </div>
        <div id="result"></div>
    </div>
    
    <script>
        async function downloadCapcut() {
            const url = document.getElementById('capcutUrl').value.trim();
            if (!url) {
                showToast('Masukkan URL CapCut!', 'error');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading-spinner-container"><div class="loading-spinner"></div><p>Memproses...</p></div>';
            
            const allowed = await checkAndUpdateLimit();
            if (!allowed) return;
            
            try {
                const response = await fetch(`/api/capcut?username=${window.currentUser?.username}&url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data.status && data.result) {
                    const r = data.result;
                    resultDiv.innerHTML = `
                        <div class="result-card">
                            <h3>${r.title || 'CapCut Template'}</h3>
                            <p>👤 ${r.author?.name || 'Unknown'}</p>
                            <p>❤️ ${r.likes || 'N/A'} | 📅 ${r.date || 'N/A'}</p>
                            <div class="video-preview">
                                ${r.videoUrl ? `<video controls><source src="${r.videoUrl}" type="video/mp4"></video>` : ''}
                            </div>
                            ${r.videoUrl ? `<button class="download-btn" onclick="downloadFile('${r.videoUrl}', 'capcut_template.mp4')">📥 Download Video</button>` : ''}
                        </div>
                    `;
                    await useLimit();
                } else {
                    resultDiv.innerHTML = '<div class="result-card"><p>❌ Gagal memproses URL</p></div>';
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result-card"><p>❌ Error: ${error.message}</p></div>`;
            }
        }
    </script>
</body>
</html>
