<!DOCTYPE html>
<html>
<head>
    <style>
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .status-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .status-value {
            font-size: 28px;
            font-weight: bold;
            color: #4facfe;
            margin-top: 10px;
        }
        
        .online {
            color: #00ff88;
        }
        
        .refresh-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #667eea;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="feature-container">
        <h2>📊 System Status</h2>
        <div class="status-grid" id="statusGrid">
            <div class="status-card">
                <h3>Uptime</h3>
                <div class="status-value" id="uptime">-</div>
            </div>
            <div class="status-card">
                <h3>Platform</h3>
                <div class="status-value" id="platform">-</div>
            </div>
            <div class="status-card">
                <h3>CPU Load</h3>
                <div class="status-value" id="cpu">-</div>
            </div>
            <div class="status-card">
                <h3>Memory Usage</h3>
                <div class="status-value" id="memory">-</div>
            </div>
            <div class="status-card">
                <h3>Total Users</h3>
                <div class="status-value" id="users">-</div>
            </div>
            <div class="status-card">
                <h3>Status</h3>
                <div class="status-value online" id="websiteStatus">🟢 Online</div>
            </div>
        </div>
        <button class="refresh-btn" onclick="loadStatus()">🔄 Refresh</button>
    </div>
    
    <script>
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                document.getElementById('uptime').textContent = formatUptime(data.uptime);
                document.getElementById('platform').textContent = data.platform;
                document.getElementById('cpu').textContent = data.cpuLoad.map(l => l.toFixed(2)).join(', ');
                document.getElementById('memory').textContent = formatBytes(data.memoryUsage.rss);
                document.getElementById('users').textContent = data.totalUsers;
                document.getElementById('websiteStatus').innerHTML = '🟢 ' + data.status;
            } catch (error) {
                console.error('Status error:', error);
            }
        }
        
        function formatUptime(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            return `${days}d ${hours}h ${minutes}m`;
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        loadStatus();
        setInterval(loadStatus, 30000); // Refresh every 30 seconds
    </script>
</body>
</html>
