<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Roblox Stalker · IkyTools 🔥</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 0% 0%, #0a0a1a 0%, #0f0f1f 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        /* Back Button */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(102,126,234,0.2);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s;
            border: 1px solid rgba(102,126,234,0.3);
            z-index: 100;
            cursor: pointer;
        }

        .back-button:hover {
            background: rgba(102,126,234,0.4);
            transform: translateX(-5px);
            border-color: #a78bfa;
        }

        .roblox-container {
            max-width: 900px;
            margin: 0 auto;
            margin-top: 80px;
            background: rgba(255,255,255,0.05);
            border-radius: 32px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .container-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .container-header h2 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .limit-info {
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-family: monospace;
            border-left: 3px solid #ff4757;
        }

        .info-card {
            background: rgba(255,71,87,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,71,87,0.3);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .info-card i {
            font-size: 2rem;
            color: #ff4757;
        }

        .info-card p {
            flex: 1;
            font-size: 0.85rem;
            color: #b9c2e6;
            line-height: 1.5;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            padding: 16px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 1rem;
            background: rgba(0,0,0,0.4);
            color: white;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #ff4757;
            box-shadow: 0 0 0 3px rgba(255,71,87,0.2);
        }

        .search-box input::placeholder {
            color: #8b92b0;
        }

        .search-box button {
            padding: 16px 32px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,71,87,0.4);
        }

        .search-box button:active {
            transform: translateY(0);
        }

        /* Result Card */
        .result-card {
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-header {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .avatar-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff4757;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .profile-name span {
            font-size: 1rem;
            color: #ff4757;
            font-weight: 500;
        }

        .profile-username {
            color: #b9c2e6;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .profile-id {
            background: rgba(255,71,87,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: inline-block;
            margin-top: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 24px 0;
            padding: 20px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ff4757;
        }

        .stat-label {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 6px;
        }

        .badge-section {
            margin: 20px 0;
        }

        .badge-title {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #ff4757;
        }

        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .badge {
            background: rgba(255,71,87,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .action-btn.secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,71,87,0.5);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* Loading Spinner */
        .loading-spinner-container {
            text-align: center;
            padding: 60px;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,71,87,0.3);
            border-top-color: #ff4757;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            color: #8b92b0;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            font-size: 0.85rem;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            border-left: 3px solid #ff4757;
        }

        .toast.success {
            border-left-color: #4ade80;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 768px) {
            .roblox-container {
                padding: 24px;
                margin-top: 90px;
            }
            .container-header h2 {
                font-size: 1.4rem;
            }
            .search-box {
                flex-direction: column;
            }
            .search-box button {
                justify-content: center;
            }
            .back-button {
                top: 12px;
                left: 12px;
                padding: 8px 16px;
                font-size: 0.8rem;
            }
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .stats-grid {
                gap: 10px;
            }
            .stat-value {
                font-size: 1.3rem;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <!-- Back Button -->
    <div class="back-button" onclick="goBack(); playClick()">
        <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
    </div>

    <div class="roblox-container">
        <div class="container-header">
            <h2>
                <i class="fab fa-roblox"></i> Roblox Stalker
            </h2>
            <div class="limit-info" id="limitInfo">
                <i class="fas fa-tachometer-alt"></i> Limit: <span id="limitValue">--</span>/50
            </div>
        </div>

        <div class="info-card">
            <i class="fab fa-roblox"></i>
            <p>Cek profil, avatar, statistik, dan informasi lengkap pengguna Roblox. Masukkan username Roblox untuk melihat detail akun termasuk friends, followers, dan badges.</p>
        </div>

        <div class="search-box">
            <input type="text" id="robloxUsername" placeholder="Masukkan username Roblox... contoh: Builderman, Roblox, Shedletsky" onkeypress="if(event.key === 'Enter') stalkRoblox()">
            <button onclick="stalkRoblox()">
                <i class="fas fa-search"></i> Stalk Profile
            </button>
        </div>

        <div id="result"></div>

        <div style="margin-top: 20px; font-size: 0.7rem; text-align: center; color: #6b728e;">
            <i class="fas fa-info-circle"></i> Data diambil langsung dari API Roblox. Pastikan username yang dimasukkan benar.
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentLimit = 0;

        function playClick() {
            const audio = document.getElementById('clickSound');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Audio blocked'));
            }
        }

        function goBack() {
            window.location.href = '/dashboard';
        }

        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        async function getLimit() {
            try {
                const response = await fetch('/api/user/limit', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (response.ok) {
                    const data = await response.json();
                    currentLimit = data.limit || 0;
                    document.getElementById('limitValue').textContent = currentLimit;
                    return currentLimit;
                }
            } catch (error) {
                console.error('Error getting limit:', error);
            }
            return 0;
        }

        async function checkAndUpdateLimit() {
            await getLimit();
            if (currentLimit <= 0) {
                showToast('⚠️ Limit harian Anda habis! Coba lagi besok.', 'error');
                return false;
            }
            return true;
        }

        async function useLimit() {
            try {
                const response = await fetch('/api/user/use-limit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser?.username })
                });
                if (response.ok) {
                    await getLimit();
                }
            } catch (error) {
                console.error('Error using limit:', error);
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
            } catch {
                return dateString;
            }
        }

        function downloadProfileData(data) {
            const profileData = {
                username: data.name,
                displayName: data.displayName,
                userId: data.id,
                created: data.created,
                friends: data.counts?.friends,
                followers: data.counts?.followers,
                following: data.counts?.following,
                profileUrl: data.profileUrl,
                avatarUrl: data.avatar
            };
            
            const dataStr = JSON.stringify(profileData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `roblox_${data.name}_profile.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('📁 Data profil berhasil disimpan!', 'success');
        }

        async function stalkRoblox() {
            const username = document.getElementById('robloxUsername').value.trim();
            if (!username) {
                showToast('Masukkan username Roblox terlebih dahulu!', 'error');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading-spinner-container"><div class="loading-spinner"></div><p>🔍 Mencari profil ' + escapeHtml(username) + ' di Roblox...</p></div>';
            
            const allowed = await checkAndUpdateLimit();
            if (!allowed) {
                resultDiv.innerHTML = '<div class="empty-state"><i class="fas fa-hourglass-half"></i><p>Limit habis! Coba lagi besok.</p></div>';
                return;
            }
            
            try {
                const response = await fetch(`/api/roblox?username=${currentUser?.username || 'guest'}&robloxUser=${encodeURIComponent(username)}`);
                const data = await response.json();
                
                if (data.status && data.result) {
                    const r = data.result;
                    const friends = r.counts?.friends || 0;
                    const followers = r.counts?.followers || 0;
                    const following = r.counts?.following || 0;
                    
                    resultDiv.innerHTML = `
                        <div class="result-card">
                            <div class="profile-header">
                                <img src="${r.avatar || 'https://www.roblox.com/headshot-thumbnail/image?userId=' + r.id + '&width=420&height=420&format=png'}" class="avatar-img" onerror="this.src='https://via.placeholder.com/120?text=No+Avatar'">
                                <div class="profile-info">
                                    <div class="profile-name">
                                        ${escapeHtml(r.displayName || r.name)} 
                                        <span>@${escapeHtml(r.name)}</span>
                                    </div>
                                    <div class="profile-username">
                                        <i class="fas fa-id-card"></i> User ID: ${r.id}
                                    </div>
                                    <div class="profile-id">
                                        <i class="fas fa-calendar-alt"></i> Bergabung: ${formatDate(r.created)}
                                    </div>
                                    ${r.description ? `<div style="margin-top: 12px; font-size: 0.8rem; color: #b9c2e6;">${escapeHtml(r.description)}</div>` : ''}
                                </div>
                            </div>
                            
                            <div class="stats-grid">
                                <div class="stat-item">
                                    <div class="stat-value">${friends.toLocaleString()}</div>
                                    <div class="stat-label"><i class="fas fa-user-friends"></i> Friends</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value">${followers.toLocaleString()}</div>
                                    <div class="stat-label"><i class="fas fa-users"></i> Followers</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value">${following.toLocaleString()}</div>
                                    <div class="stat-label"><i class="fas fa-user-plus"></i> Following</div>
                                </div>
                            </div>
                            
                            ${r.badges && r.badges.length > 0 ? `
                                <div class="badge-section">
                                    <div class="badge-title"><i class="fas fa-medal"></i> Badges & Achievement</div>
                                    <div class="badge-list">
                                        ${r.badges.slice(0, 8).map(badge => `
                                            <span class="badge"><i class="fas fa-award"></i> ${escapeHtml(badge.name || badge)}</span>
                                        `).join('')}
                                        ${r.badges.length > 8 ? `<span class="badge">+${r.badges.length - 8} lainnya</span>` : ''}
                                    </div>
                                </div>
                            ` : ''}
                            
                            <div class="action-buttons">
                                <button class="action-btn" onclick="window.open('https://www.roblox.com/users/${r.id}/profile', '_blank'); playClick()">
                                    <i class="fab fa-roblox"></i> Buka Profil Roblox
                                </button>
                                <button class="action-btn secondary" onclick="downloadProfileData(${JSON.stringify(r).replace(/"/g, '&quot;')}); playClick()">
                                    <i class="fas fa-download"></i> Simpan Data (JSON)
                                </button>
                            </div>
                        </div>
                    `;
                    
                    await useLimit();
                } else {
                    resultDiv.innerHTML = `
                        <div class="empty-state">
                            <i class="fab fa-roblox"></i>
                            <p>User "${escapeHtml(username)}" tidak ditemukan di Roblox</p>
                            <p style="font-size: 0.75rem; margin-top: 10px;">Pastikan username benar dan akun tersebut masih aktif.</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-wifi"></i>
                        <p>Error: ${error.message}</p>
                        <p style="font-size: 0.75rem; margin-top: 10px;">Periksa koneksi internet Anda dan coba lagi.</p>
                    </div>
                `;
                console.error(error);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Load user and limit
        async function loadUser() {
            const userData = localStorage.getItem('currentUser');
            if (userData) {
                currentUser = JSON.parse(userData);
            }
            await getLimit();
        }

        // Audio click sound
        const clickAudio = new Audio('/audio/click.mp3');
        clickAudio.volume = 0.2;
        window.playClick = function() {
            const clone = clickAudio.cloneNode();
            clone.play().catch(() => {});
        };

        loadUser();
    </script>
</body>
</html>
