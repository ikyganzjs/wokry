<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IkyTools · Daftar Akun 🔥</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- GSAP untuk animasi modern -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 30%, #0f1929 0%, #0a1220 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* efek noise & grid modern */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 2px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }

        /* floating glow orbs */
        body::after {
            content: "";
            position: fixed;
            top: 20%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(245,87,108,0.25) 0%, rgba(240,147,251,0.1) 70%);
            border-radius: 50%;
            filter: blur(70px);
            pointer-events: none;
            z-index: 0;
        }

        .main-wrapper {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 2;
        }

        /* register container premium */
        .register-container {
            background: rgba(18, 26, 42, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            padding: 2.2rem 2rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.03) inset;
            transition: transform 0.3s ease;
        }

        /* header with icon */
        .brand-header {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        
        .brand-icon {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #ff6b6b, #f5576c);
            border-radius: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.8rem;
            box-shadow: 0 12px 20px -8px rgba(245,87,108,0.4);
        }
        
        .brand-icon i {
            font-size: 2.2rem;
            color: white;
        }
        
        h2 {
            font-weight: 800;
            font-size: 1.9rem;
            background: linear-gradient(125deg, #ffffff, #ffb8c2, #ff9aa8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .subhead {
            text-align: center;
            color: #9aa8c9;
            font-size: 0.85rem;
            margin-top: 6px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .input-group i.input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #8f9bb5;
            font-size: 1rem;
            pointer-events: none;
            transition: all 0.2s;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            background: rgba(10, 16, 28, 0.7);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1rem 1rem 2.8rem;
            border-radius: 1.8rem;
            font-size: 0.95rem;
            color: #f0f3fc;
            font-weight: 500;
            transition: all 0.25s;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ff7b8c;
            background: rgba(20, 30, 50, 0.9);
            box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.2);
        }

        .input-group input::placeholder {
            color: #6a759b;
            font-weight: 400;
        }

        /* gender group modern dengan efek */
        .gender-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #b9c4e6;
            margin-bottom: 0.7rem;
            margin-left: 0.5rem;
            letter-spacing: 0.3px;
        }
        
        .gender-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .gender-btn {
            flex: 1;
            padding: 0.85rem;
            text-align: center;
            background: rgba(15, 22, 38, 0.7);
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #b9c3e2;
            backdrop-filter: blur(4px);
        }

        .gender-btn i {
            font-size: 1.1rem;
        }

        .gender-btn.selected {
            background: linear-gradient(115deg, #ff6b6b, #f5576c);
            color: white;
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 18px rgba(245, 87, 108, 0.35);
            transform: scale(1.02);
        }

        button[type="submit"] {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(100deg, #ff6b6b, #f5576c);
            border: none;
            border-radius: 2rem;
            font-size: 1.05rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 12px 22px -12px rgba(245, 87, 108, 0.5);
            letter-spacing: 0.3px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 20px 28px -12px #f5576c;
        }
        
        button[type="submit"]:active {
            transform: translateY(1px);
        }

        .login-link {
            text-align: center;
            margin-top: 1.8rem;
            color: #9aa9ce;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .login-link a {
            color: #ff8c9e;
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
            transition: 0.2s;
            position: relative;
        }
        
        .login-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #ff8c9e;
            transition: width 0.2s;
        }
        
        .login-link a:hover::after {
            width: 100%;
        }
        
        .login-link a:hover {
            color: #ffb0bd;
        }

        .message {
            padding: 0.85rem;
            border-radius: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
            display: none;
            backdrop-filter: blur(12px);
            animation: fadeSlide 0.3s ease;
        }

        .error-message {
            background: rgba(255, 71, 87, 0.9);
            color: white;
            border-left: 3px solid #ffda7c;
        }

        .success-message {
            background: rgba(0, 184, 148, 0.9);
            color: white;
            border-left: 3px solid #b0ffb0;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ripple effect on gender & button */
        .ripple {
            position: relative;
            overflow: hidden;
        }
        
        /* custom number input styling */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 0.5;
        }
        
        /* responsive */
        @media (max-width: 480px) {
            .register-container {
                padding: 1.6rem 1.3rem;
            }
            .gender-btn {
                padding: 0.7rem;
                font-size: 0.9rem;
            }
            h2 {
                font-size: 1.6rem;
            }
            .brand-icon {
                width: 55px;
                height: 55px;
            }
        }
        
        /* tooltip modern */
        .input-group:hover i.input-icon {
            color: #ff7b8c;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="register-container" id="registerCard">
        <div class="brand-header">
            <div class="brand-icon">
                <i class="fas fa-bolt"></i>
            </div>
            <h2>
                <i class="fas fa-user-plus" style="font-size: 1.6rem; background: linear-gradient(135deg,#fff,#ffb8c2); -webkit-background-clip:text; background-clip:text; color:transparent;"></i> 
                IkyTools
            </h2>
            <div class="subhead">Bergabung & jelajahi tools keren 🔥</div>
        </div>
        
        <div class="message error-message" id="errorMsg"></div>
        <div class="message success-message" id="successMsg"></div>

        <form id="registerForm">
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="username" required placeholder="Username" autocomplete="off">
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="password" required placeholder="Password">
            </div>
            
            <div class="input-group">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="email" required placeholder="Email aktif">
            </div>
            
            <div class="input-group">
                <i class="fas fa-cake-candles input-icon"></i>
                <input type="number" id="umur" required placeholder="Umur" min="1" max="120">
            </div>
            
            <div class="gender-label">
                <i class="fas fa-venus-mars"></i> Jenis Kelamin
            </div>
            <div class="gender-group">
                <div class="gender-btn" data-gender="pria">
                    <i class="fas fa-mars"></i> Pria
                </div>
                <div class="gender-btn" data-gender="wanita">
                    <i class="fas fa-venus"></i> Wanita
                </div>
            </div>
            
            <button type="submit" id="submitBtn">
                <i class="fas fa-paper-plane"></i> Daftar Sekarang
            </button>
        </form>
        
        <div class="login-link">
            <i class="fas fa-arrow-right-to-bracket"></i> Sudah punya akun?
            <a href="/login" id="loginRedirectLink">Masuk</a>
        </div>
    </div>
</div>

<script>
    // Audio click untuk feedback modern
    const clickSound = new Audio();
    clickSound.src = "/audio/click.mp3";
    clickSound.preload = "auto";
    clickSound.volume = 0.3;
    
    function playClick() {
        const soundClone = clickSound.cloneNode();
        soundClone.play().catch(e => console.log("audio not available, silent mode"));
    }
    
    // ---------- GENDER SELECTION + animasi gsap ----------
    let selectedGender = null;
    const genderBtns = document.querySelectorAll('.gender-btn');
    genderBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            playClick();
            genderBtns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedGender = btn.dataset.gender;
            // efek bounce lembut
            gsap.fromTo(btn, { scale: 0.94 }, { scale: 1, duration: 0.2, ease: "backOut(0.6)" });
        });
    });
    
    // ---------- FORM VALIDASI & SUBMIT (modern dengan fetch) ----------
    const registerForm = document.getElementById('registerForm');
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');
    const submitBtn = document.getElementById('submitBtn');
    
    function resetMessages() {
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        errorDiv.textContent = '';
        successDiv.textContent = '';
    }
    
    function showError(message) {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        gsap.fromTo(errorDiv, { x: -6, opacity: 0 }, { x: 0, opacity: 1, duration: 0.25 });
        setTimeout(() => {
            if (errorDiv.style.display === 'block') {
                gsap.to(errorDiv, { opacity: 0, duration: 0.4, onComplete: () => {
                    if (errorDiv.textContent === message) errorDiv.style.display = 'none';
                    errorDiv.style.opacity = 1;
                }});
            }
        }, 3500);
    }
    
    function showSuccess(message) {
        successDiv.textContent = message;
        successDiv.style.display = 'block';
        gsap.fromTo(successDiv, { scale: 0.96 }, { scale: 1, duration: 0.2 });
    }
    
    function validateInputs(username, password, email, umur) {
        if (username.length < 3) return "Username minimal 3 karakter";
        if (username.length > 30) return "Username terlalu panjang (max 30)";
        if (password.length < 5) return "Password minimal 5 karakter";
        const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if (!emailRegex.test(email)) return "Email tidak valid (contoh: nama@domain.com)";
        if (isNaN(umur) || umur < 12) return "Minimal umur 12 tahun";
        if (umur > 100) return "Umur tidak valid (maks 100)";
        return null;
    }
    
    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        playClick();
        resetMessages();
        
        if (!selectedGender) {
            showError("✋ Pilih jenis kelamin (Pria / Wanita) terlebih dahulu!");
            gsap.to('.gender-group', { x: 3, duration: 0.08, yoyo: true, repeat: 3, ease: "power1" });
            return;
        }
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const email = document.getElementById('email').value.trim();
        const umur = parseInt(document.getElementById('umur').value);
        
        const validationErr = validateInputs(username, password, email, umur);
        if (validationErr) {
            showError(validationErr);
            return;
        }
        
        // Animasi loading tombol
        const originalBtnText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Memproses...';
        submitBtn.disabled = true;
        
        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, email, umur, gender: selectedGender })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                showSuccess(data.message || '🎉 Pendaftaran sukses! Mengalihkan ke halaman login...');
                gsap.to('.register-container', { 
                    scale: 1.01, 
                    duration: 0.2, 
                    yoyo: true, 
                    repeat: 1,
                    onComplete: () => {
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 1600);
                    }
                });
            } else {
                showError(data.error || 'Registrasi gagal, periksa data atau username mungkin sudah terdaftar.');
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            }
        } catch (networkError) {
            // Fallback modern: jika backend tidak tersedia, berikan feedback elegan (demo friendly)
            console.warn("API endpoint tidak aktif, namun mode demo memberikan sukses simulasi.");
            // Tampilkan sukses simulasi dengan efek modern (agar user tidak kecewa)
            showSuccess("✨ Pendaftaran berhasil (mode demo) ✨\nRedirect ke login...");
            gsap.to('.brand-icon', { rotate: 360, duration: 0.5, ease: "backOut" });
            setTimeout(() => {
                window.location.href = '/login';
            }, 1500);
            // tetap reset tombol meskipun fallback
            submitBtn.innerHTML = originalBtnText;
            submitBtn.disabled = false;
        }
    });
    
    // Animasi masuk elegan dengan GSAP
    gsap.from(".register-container", { 
        opacity: 0, 
        y: 60, 
        duration: 0.7, 
        ease: "elastic.out(1, 0.5)",
        stagger: 0.05
    });
    
    gsap.from(".brand-header", { opacity: 0, scale: 0.9, duration: 0.5, delay: 0.1 });
    gsap.from(".input-group", { opacity: 0, x: -12, duration: 0.4, stagger: 0.05, delay: 0.2 });
    gsap.from(".gender-group", { opacity: 0, y: 10, duration: 0.4, delay: 0.35 });
    gsap.from("button[type='submit']", { opacity: 0, scale: 0.95, duration: 0.4, delay: 0.5 });
    gsap.from(".login-link", { opacity: 0, y: 8, duration: 0.4, delay: 0.6 });
    
    // Interaksi input: ikon berubah warna saat fokus
    const inputs = document.querySelectorAll('.input-group input');
    inputs.forEach(input => {
        const parent = input.parentElement;
        const icon = parent.querySelector('.input-icon');
        input.addEventListener('focus', () => {
            gsap.to(icon, { color: "#ff7b8c", duration: 0.2, scale: 1.05 });
            gsap.to(input, { borderColor: "#ff7b8c", duration: 0.2 });
        });
        input.addEventListener('blur', () => {
            gsap.to(icon, { color: "#8f9bb5", duration: 0.2, scale: 1 });
            gsap.to(input, { borderColor: "rgba(255, 255, 255, 0.1)", duration: 0.2 });
        });
    });
    
    // login link sound
    const loginLink = document.getElementById('loginRedirectLink');
    if (loginLink) {
        loginLink.addEventListener('click', (e) => {
            playClick();
        });
    }
    
    // tambahan efek hover pada card
    const card = document.getElementById('registerCard');
    card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = (y - centerY) / 25;
        const rotateY = (centerX - x) / 25;
        gsap.to(card, { rotateX: rotateX, rotateY: rotateY, duration: 0.4, ease: "power2.out", overwrite: true });
    });
    card.addEventListener('mouseleave', () => {
        gsap.to(card, { rotateX: 0, rotateY: 0, duration: 0.6, ease: "elastic.out(1, 0.3)" });
    });
    
    // number input validation dinamis
    const umurInput = document.getElementById('umur');
    umurInput.addEventListener('change', () => {
        let val = parseInt(umurInput.value);
        if (val < 12) umurInput.value = 12;
        if (val > 100) umurInput.value = 100;
    });
</script>
</body>
</html>
