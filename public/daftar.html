<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - IkyTools 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .register-container {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 50px 40px;
            width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #f5576c;
        }
        
        .gender-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .gender-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #f0f0f0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .gender-btn.selected {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-color: #f5576c;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .login-link a {
            color: #f5576c;
            text-decoration: none;
            font-weight: bold;
        }
        
        .error-message, .success-message {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .error-message {
            background: #ff4757;
            color: white;
        }
        
        .success-message {
            background: #00b894;
            color: white;
        }
        
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <audio id="clickSound" src="/audio/click.mp3" preload="auto"></audio>
    
    <div class="register-container">
        <h2>📝 Daftar Akun</h2>
        <div class="error-message" id="errorMsg"></div>
        <div class="success-message" id="successMsg"></div>
        
        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="username" required placeholder="Username">
            </div>
            
            <div class="input-group">
                <input type="password" id="password" required placeholder="Password">
            </div>
            
            <div class="input-group">
                <input type="email" id="email" required placeholder="Email">
            </div>
            
            <div class="input-group">
                <input type="number" id="umur" required placeholder="Umur" min="1" max="120">
            </div>
            
            <div class="gender-group">
                <div class="gender-btn" data-gender="pria">👨 Pria</div>
                <div class="gender-btn" data-gender="wanita">👩 Wanita</div>
            </div>
            
            <button type="submit" onclick="playClick()">✅ Daftar Sekarang</button>
        </form>
        
        <div class="login-link">
            Sudah punya akun? <a href="/login" onclick="playClick()">Login Disini</a>
        </div>
    </div>
    
    <script>
        let selectedGender = null;
        
        function playClick() {
            const audio = document.getElementById('clickSound');
            audio.currentTime = 0;
            audio.play().catch(e => console.log('Audio blocked'));
        }
        
        document.querySelectorAll('.gender-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                playClick();
                document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedGender = btn.dataset.gender;
            });
        });
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            playClick();
            
            if (!selectedGender) {
                document.getElementById('errorMsg').textContent = 'Pilih jenis kelamin dulu!';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const umur = document.getElementById('umur').value;
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email, umur, gender: selectedGender })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('successMsg').textContent = data.message;
                    document.getElementById('successMsg').style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    document.getElementById('errorMsg').textContent = data.error;
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Error koneksi!';
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
